services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dropbox
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dropbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: dropbox
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dropbox
      SPRING_DATASOURCE_USERNAME: dropbox
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8080:8080"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "80:80"
volumes:
  postgres_data:
  minio_data:
