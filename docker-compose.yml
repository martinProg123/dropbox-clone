services:
  postgres-prod:
    image: postgres:16
    environment:
      POSTGRES_USER: dropbox
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dropbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropbox"]
      interval: 10s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: dropbox
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    image: ${DOCKER_HUB_USERNAME}/dropbox-backend:latest
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-prod:5432/dropbox
      SPRING_DATASOURCE_USERNAME: dropbox
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: minio:9000
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres-prod:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
  frontend:
    image: ${DOCKER_HUB_USERNAME}/dropbox-frontend:latest
    env_file:
      - .env.prod
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "49200:80"
    depends_on:
      backend:
        condition: service_started
volumes:
  postgres_data:
  minio_data:
