spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/dropbox
    username: dropbox
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: dropbox
    password: ${RABBITMQ_PASSWORD}

minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_USER}
  secret-key: ${MINIO_PASSWORD}
  bucket: dropbox-files

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

app:
  cors-origins: ${CORS_ORIGINS}
  file-size-limit: 52428800
